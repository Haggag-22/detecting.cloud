<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary brand icons (Detecting.Cloud — not third-party defaults) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <title>Detecting.Cloud</title>
    <meta
      name="description"
      content="Cloud attack research, detection rules, and defensive security for AWS environments."
    />
    <meta name="author" content="Detecting.Cloud" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Open Graph (Google, LinkedIn, Slack, iMessage, etc.) -->
    <meta property="og:title" content="Detecting.Cloud" />
    <meta
      property="og:description"
      content="Cloud attack research, detection rules, and defensive security for AWS environments."
    />
    <meta property="og:image" content="https://detecting.cloud/preview.png" />
    <meta property="og:url" content="https://detecting.cloud" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Detecting.Cloud" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:image:alt"
      content="Detecting.Cloud — cloud attack research and detection rules for AWS"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Detecting.Cloud" />
    <meta
      name="twitter:description"
      content="Cloud attack research, detection rules, and defensive security for AWS environments."
    />
    <meta name="twitter:image" content="https://detecting.cloud/preview.png" />
    <meta name="twitter:site" content="@DetectingCloud" />

    <!--
      Supplementary icons: multi-size PNG + ICO for crawlers and high-DPI tabs.
      First <link rel="icon"> above remains /favicon.png per product branding.
    -->
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
